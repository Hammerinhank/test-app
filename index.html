<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Géolocalisation avec Carte</title>

    <!-- En-tête Leaflet pour la carte (CSS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            text-align: center;
            padding: 25px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 20px;
        }
        button {
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background-color: #34c759; /* Vert iOS */
            color: white;
            border: none;
            border-radius: 10px;
            width: 100%;
            transition: background 0.2s;
        }
        button:active {
            background-color: #248a3d;
        }
        /* Bouton "Je suis garé ici" */
        .btn-voiture {
            background-color: #007aff; /* Bleu iOS */
            margin-top: 12px;
        }
        .btn-voiture:active {
            background-color: #0051d5;
        }
        .statut {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #007aff;
            min-height: 18px;
        }
        .info {
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
            background: #f5f5f7;
            padding: 15px;
            border-radius: 10px;
            display: none;
            word-break: break-word;
        }
        .adresse {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }
        /* Conteneur de la carte - Hauteur obligatoire pour Leaflet */
        #map {
            height: 250px;
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            display: none; /* Caché au début */
            box-shadow: inset 0 0 5px rgba(0,0,0,0.15);
        }
        .error {
            color: #ff3b30;
            font-weight: 600;
        }
        /* Icône voiture (emoji) posée sur la carte */
        .icone-voiture {
            font-size: 26px;
            line-height: 36px;
            text-align: center;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Où suis-je ?</h1>
        <p>Clique sur le bouton pour afficher la carte en direct.</p>
        <button onclick="trouverPosition()">Ma Position Actuelle</button>
        <button class="btn-voiture" onclick="memoriserVoiture()">🚗 Je suis garé ici</button>

        <div id="statut-voiture" class="statut"></div>
        <div id="bloc-info" class="info"></div>
        <!-- La carte s'affichera ici -->
        <div id="map"></div>
    </div>

    <!-- Moteur de la carte Leaflet (JavaScript) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let carte = null;            // Instance de la carte
        let marqueur = null;         // Marqueur "Tu es ici"
        let marqueurVoiture = null;  // Marqueur de la voiture garée

        const CLE_VOITURE = 'positionVoiture';   // Clé de sauvegarde localStorage

        const OPTIONS_GEO = {
            enableHighAccuracy: true,
            timeout: 7000,
            maximumAge: 0
        };

        // Icône personnalisée représentant la voiture (emoji, aucune image externe)
        const iconeVoiture = L.divIcon({
            html: '🚗',
            className: 'icone-voiture',
            iconSize: [36, 36],
            iconAnchor: [18, 18],
            popupAnchor: [0, -18]
        });

        // ---------- Carte : création unique / réutilisation ----------
        function assurerCarte(lat, lon, zoom) {
            const mapDiv = document.getElementById('map');
            mapDiv.style.display = "block";

            if (carte === null) {
                carte = L.map('map').setView([lat, lon], zoom || 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(carte);
            }
            // La div vient (peut-être) de passer de "none" à "block" : on force
            // Leaflet à recalculer sa taille (évite tuiles grises / centrage décalé).
            setTimeout(() => carte.invalidateSize(), 100);
        }

        // ---------- Ma position ----------
        function trouverPosition() {
            const blocInfo = document.getElementById('bloc-info');
            blocInfo.style.display = "block";
            blocInfo.innerHTML = "<em>Demande d'autorisation et calcul en cours...</em>";

            if (!navigator.geolocation) {
                blocInfo.innerHTML = "<span class='error'>La géolocalisation n'est pas supportée.</span>";
                return;
            }

            navigator.geolocation.getCurrentPosition(succes, erreur, OPTIONS_GEO);
        }

        function succes(position) {
            const blocInfo = document.getElementById('bloc-info');

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const precision = position.coords.accuracy;

            // 1. Affichage des coordonnées + zone d'adresse (en attente)
            blocInfo.innerHTML = `
                <strong>Latitude :</strong> ${lat.toFixed(6)}<br>
                <strong>Longitude :</strong> ${lon.toFixed(6)}<br>
                <strong>Précision :</strong> ~${Math.round(precision)} mètres
                <div class="adresse" id="bloc-adresse"><em>Recherche de l'adresse…</em></div>
            `;

            // 2. Carte + marqueur "Tu es ici"
            assurerCarte(lat, lon, 16);
            carte.setView([lat, lon], 16);

            if (marqueur === null) {
                marqueur = L.marker([lat, lon]).addTo(carte);
            } else {
                marqueur.setLatLng([lat, lon]);
            }
            marqueur.bindPopup('Tu es ici !').openPopup();

            // 3. Recherche de l'adresse (reverse geocoding via Nominatim)
            trouverAdresse(lat, lon);
        }

        // ---------- Voiture garée ----------
        function memoriserVoiture() {
            const statut = document.getElementById('statut-voiture');

            if (!navigator.geolocation) {
                statut.innerHTML = "<span class='error'>La géolocalisation n'est pas supportée.</span>";
                return;
            }

            statut.textContent = "Enregistrement de la position de la voiture…";

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                sauvegarderVoiture(lat, lon);   // persistance
                afficherVoiture(lat, lon);      // icône sur la carte
                carte.setView([lat, lon], 16);

                statut.textContent = "🚗 Voiture enregistrée !";
            }, () => {
                statut.innerHTML = "<span class='error'>Impossible de récupérer la position pour la voiture.</span>";
            }, OPTIONS_GEO);
        }

        // Place ou déplace l'icône voiture (crée la carte si besoin)
        function afficherVoiture(lat, lon) {
            assurerCarte(lat, lon, 16);

            if (marqueurVoiture === null) {
                marqueurVoiture = L.marker([lat, lon], { icon: iconeVoiture }).addTo(carte);
            } else {
                marqueurVoiture.setLatLng([lat, lon]);
            }
            marqueurVoiture.bindPopup('🚗 Ma voiture est garée ici');
        }

        function sauvegarderVoiture(lat, lon) {
            try {
                localStorage.setItem(CLE_VOITURE, JSON.stringify({ lat, lon }));
            } catch (e) {
                // Stockage indisponible (navigation privée, aperçu en bac à sable…)
                console.warn("Sauvegarde de la voiture impossible :", e);
            }
        }

        function chargerVoiture() {
            try {
                const brut = localStorage.getItem(CLE_VOITURE);
                return brut ? JSON.parse(brut) : null;
            } catch (e) {
                return null;
            }
        }

        // ---------- Adresse (reverse geocoding) ----------
        async function trouverAdresse(lat, lon) {
            const blocAdresse = document.getElementById('bloc-adresse');
            if (!blocAdresse) return;

            const url = `https://nominatim.openstreetmap.org/reverse?format=json`
                      + `&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1&accept-language=fr`;

            try {
                const reponse = await fetch(url);
                if (!reponse.ok) throw new Error("Réponse invalide");

                const data = await reponse.json();
                const a = data.address || {};

                const numero = a.house_number || '';
                const rue    = a.road || a.pedestrian || a.footway || '';
                const cp     = a.postcode || '';
                const ville  = a.city || a.town || a.village || a.municipality || '';
                const pays   = a.country || '';

                const ligneRue = [numero, rue].filter(Boolean).join(' ');
                const ligneVille = [cp, ville].filter(Boolean).join(' ');

                blocAdresse.innerHTML = `
                    <strong>Adresse :</strong><br>
                    ${ligneRue || '—'}<br>
                    ${ligneVille || ''}<br>
                    ${pays || ''}
                `;
            } catch (e) {
                blocAdresse.innerHTML =
                    "<span class='error'>Adresse introuvable pour le moment.</span>";
            }
        }

        function erreur(err) {
            const blocInfo = document.getElementById('bloc-info');
            document.getElementById('map').style.display = "none";

            if (err.code === err.PERMISSION_DENIED) {
                blocInfo.innerHTML = "<span class='error'>Accès refusé. Autorise la géolocalisation dans iOS.</span>";
            } else {
                blocInfo.innerHTML = "<span class='error'>Impossible d'obtenir une position précise.</span>";
            }
        }

        // ---------- Au lancement : réafficher la voiture si elle est mémorisée ----------
        window.addEventListener('load', () => {
            const v = chargerVoiture();
            if (v) {
                const statut = document.getElementById('statut-voiture');
                statut.textContent = "🚗 Voiture mémorisée — voici où elle est garée.";
                afficherVoiture(v.lat, v.lon);
                carte.setView([v.lat, v.lon], 16);
            }
        });
    </script>

</body>
</html>
